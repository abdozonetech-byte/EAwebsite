<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Namaa Pack — Elboubakry Abdessamad</title>
  <link rel="icon" href="../images/favicon.png" />
  <style>
    :root {
      --navy: #071226;
      --blue: #155eef;
      --soft: #f4f7fb;
      --line: #e6ebf2;
      --muted: #64748b;
      --ink: #111827;
      --card: #ffffff;
      --shadow: 0 24px 70px rgba(15, 23, 42, .10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top right, rgba(21,94,239,.09), transparent 34%), var(--soft);
    }
    .pack-shell { max-width: 1180px; margin: 0 auto; padding: 30px 20px 54px; }
    .pack-header {
      display: flex; align-items: center; justify-content: space-between; gap: 18px;
      background: rgba(255,255,255,.82); border: 1px solid rgba(226,232,240,.9);
      border-radius: 28px; padding: 18px 22px; box-shadow: var(--shadow); backdrop-filter: blur(16px);
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-mark { width: 58px; height: 58px; border-radius: 18px; display: grid; place-items: center; background: linear-gradient(135deg,#0ea5e9,#155eef); color:#fff; font-weight:900; font-size:24px; box-shadow:0 16px 34px rgba(21,94,239,.28); overflow:hidden; }
    .brand-mark img { width: 100%; height: 100%; object-fit: cover; }
    .brand h1 { margin: 0; font-size: clamp(24px, 4vw, 42px); letter-spacing: -.045em; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-weight: 700; }
    .pill { background:#ecfdf5; color:#047857; padding: 10px 14px; border-radius: 999px; font-weight: 900; border:1px solid #bbf7d0; white-space: nowrap; }
    .hero { margin-top: 22px; display: grid; grid-template-columns: 1.25fr .75fr; gap: 22px; }
    .panel { background: var(--card); border: 1px solid var(--line); border-radius: 30px; padding: 28px; box-shadow: var(--shadow); }
    .kicker { display:inline-flex; align-items:center; gap:8px; padding: 8px 12px; border-radius: 999px; background:#eef4ff; color:#155eef; font-size: 13px; font-weight: 900; }
    .project-title { margin: 18px 0 10px; font-size: clamp(28px, 5vw, 58px); line-height: .94; letter-spacing: -.06em; }
    .sub { color: var(--muted); font-size: 16px; line-height: 1.65; max-width: 760px; }
    .meta-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; margin-top: 18px; }
    .meta { background:#f8fafc; border:1px solid var(--line); border-radius: 18px; padding: 14px; }
    .meta span { display:block; color:var(--muted); font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 5px; }
    .meta strong { font-size: 15px; }
    .flow { display:grid; gap: 10px; }
    .flow-step { display:flex; align-items:center; gap:12px; padding: 14px; border-radius: 18px; background:#f8fafc; border:1px solid var(--line); font-weight:800; }
    .flow-step b { width: 30px; height: 30px; display:grid; place-items:center; border-radius: 10px; background:#155eef; color:white; }
    .section-title { margin: 30px 0 14px; font-size: 24px; letter-spacing: -.03em; }
    .cards { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
    .card { background:white; border:1px solid var(--line); border-radius: 26px; padding:22px; box-shadow: 0 18px 50px rgba(15,23,42,.07); min-height: 240px; }
    .card h3 { margin: 0 0 12px; font-size: 20px; letter-spacing: -.025em; }
    .card pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-family: inherit; color:#334155; line-height: 1.55; font-size: 14px; }
    .wide { grid-column: 1 / -1; }
    .empty { max-width: 680px; margin: 70px auto; text-align:center; }
    .empty h1 { font-size: 36px; letter-spacing:-.05em; }
    .empty p { color: var(--muted); line-height:1.7; }
    .footer { text-align:center; color: var(--muted); margin-top: 30px; font-weight: 700; }
    @media (max-width: 900px) { .hero, .cards { grid-template-columns: 1fr; } .pack-header { align-items:flex-start; flex-direction:column; } .meta-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="pack-shell" id="packRoot">
    <section class="empty">
      <h1>Namaa Pack</h1>
      <p>Pack link ma fihch data daba. 3awed tlbo mn Namaa Strategy w dkhel email dyalk mn popup.</p>
    </section>
  </main>
  <script>
    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, function (char) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
      });
    }
    function decodeBase64Url(value) {
      const base64 = String(value || '').replace(/-/g, '+').replace(/_/g, '/');
      const padded = base64 + '='.repeat((4 - base64.length % 4) % 4);
      return decodeURIComponent(escape(atob(padded)));
    }
    function getPackData() {
      const hash = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
      const raw = hash.get('p');
      if (!raw) return null;
      try { return JSON.parse(decodeBase64Url(raw)); } catch (error) { return null; }
    }
    function briefRows(brief) {
      const b = brief && typeof brief === 'object' ? brief : {};
      const rows = [
        ['Project', b.projectName || b.category || b.offer],
        ['City / Market', b.city || b.market],
        ['Target', b.targetCustomer || b.target],
        ['Budget', b.budget],
        ['Goal', b.goal],
        ['Stage', b.stage]
      ].filter(function (row) { return row[1]; });
      return rows.map(function (row) { return '<div class="meta"><span>' + escapeHtml(row[0]) + '</span><strong>' + escapeHtml(row[1]) + '</strong></div>'; }).join('') || '<div class="meta"><span>Project</span><strong>Namaa AI Pack</strong></div>';
    }
    function renderPack(pack) {
      const root = document.getElementById('packRoot');
      const title = pack.projectTitle || 'Namaa AI Project';
      root.innerHTML = `
        <header class="pack-header">
          <div class="brand">
            <div class="brand-mark"><img src="../images/logo.png" alt="Namaa" onerror="this.remove();this.parentNode.textContent='N'" /></div>
            <div><h1>Namaa Pack</h1><p>Created by Elboubakry Abdessamad</p></div>
          </div>
          <div class="pill">Pack link ready</div>
        </header>
        <section class="hero">
          <article class="panel">
            <span class="kicker">Moroccan AI Business Assistant</span>
            <h2 class="project-title">${escapeHtml(title)}</h2>
            <p class="sub">Hada pack generated mn Namaa flow: Talk → Design → Website → Strategy. T9der tراجع brief, design direction, landing page summary, w strategy roadmap f page wa7da organisée.</p>
            <div class="meta-grid">${briefRows(pack.projectBrief)}</div>
          </article>
          <aside class="panel flow">
            <div class="flow-step"><b>1</b><span>Namaa Talk — project brief</span></div>
            <div class="flow-step"><b>2</b><span>Namaa Design — logo & mockups</span></div>
            <div class="flow-step"><b>3</b><span>Namaa Website — landing preview</span></div>
            <div class="flow-step"><b>4</b><span>Namaa Strategy — final roadmap</span></div>
          </aside>
        </section>
        <h2 class="section-title">Pack dashboard</h2>
        <section class="cards">
          <article class="card"><h3>Design direction</h3><pre>${escapeHtml(pack.designOutput || 'Design output not available in this pack link.')}</pre></article>
          <article class="card"><h3>Website preview summary</h3><pre>${escapeHtml(pack.websiteOutput || 'Website summary not available in this pack link.')}</pre></article>
          <article class="card"><h3>Strategy roadmap</h3><pre>${escapeHtml(pack.strategyOutput || 'Strategy output not available in this pack link.')}</pre></article>
          <article class="card wide"><h3>Project brief</h3><pre>${escapeHtml(JSON.stringify(pack.projectBrief || {}, null, 2))}</pre></article>
        </section>
        <p class="footer">Namaa AI © Elboubakry Abdessamad</p>
      `;
    }
    const pack = getPackData();
    if (pack) renderPack(pack);
  </script>
</body>
</html>
